<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Google Fonts for retro 90s computer look -->
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=VT323&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Pet Sprite -->
  <g id="pet-sprite" transform="translate(200, 120)">
    
    <ellipse cx="0" cy="0" rx="35" ry="50" fill="#e8e8e8" stroke="#999" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="30" ry="45" fill="#f5f5f5" opacity="0.6"/>
    <ellipse cx="-10" cy="-15" rx="8" ry="12" fill="#fff" opacity="0.8"/>

  </g>
  
  <!-- Username -->
  <text x="200" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>
    pooravrawat1's Pet
  </text>
  
  <!-- Stage and Level Label -->
  <text x="200" y="55" text-anchor="middle" font-size="14" fill="#666" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>
    Stage: egg | Level 0
  </text>
  
  <!-- Mood Text (below sprite, above bars) -->
  <text x="200" y="205" text-anchor="middle" font-size="12" fill="#888" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>
    Getting hungry!
  </text>
  
  <!-- Stat Bars -->
  <g id="stats" transform="translate(50, 220)">
    <!-- Hunger Bar -->
    <text x="0" y="0" font-size="12" fill="#333" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>Hunger:</text>
    <rect x="70" y="-10" width="200" height="15" fill="#ddd" rx="5"/>
    <rect x="70" y="-10" width="0.0" height="15" fill="#ff6b6b" rx="5"/>
    <text x="280" y="0" font-size="11" fill="#666" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>0</text>
    
    <!-- Happiness Bar -->
    <text x="0" y="25" font-size="12" fill="#333" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>Happy:</text>
    <rect x="70" y="15" width="200" height="15" fill="#ddd" rx="5"/>
    <rect x="70" y="15" width="0.0" height="15" fill="#ffd93d" rx="5"/>
    <text x="280" y="25" font-size="11" fill="#666" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>0</text>
    
    <!-- Health Bar -->
    <text x="0" y="50" font-size="12" fill="#333" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>Health:</text>
    <rect x="70" y="40" width="200" height="15" fill="#ddd" rx="5"/>
    <rect x="70" y="40" width="0.0" height="15" fill="#6bcf7f" rx="5"/>
    <text x="280" y="50" font-size="11" fill="#666" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>0</text>
    
    <!-- Energy Bar -->
    <text x="0" y="75" font-size="12" fill="#333" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>Energy:</text>
    <rect x="70" y="65" width="200" height="15" fill="#ddd" rx="5"/>
    <rect x="70" y="65" width="0.0" height="15" fill="#4d96ff" rx="5"/>
    <text x="280" y="75" font-size="11" fill="#666" font-family='"Press Start 2P", "VT323", "Courier New", Courier, monospace'>0</text>
  </g>
</svg>