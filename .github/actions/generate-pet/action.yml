# Composite action: generate GitHub Tamagotchi pet SVG and commit it.
# Uses GITHUB_ACTION_PATH to find the action repo (scripts and deps); runs in the workflow repo.
#
# Add to your profile repo (username/username) - see README for full workflow example.

name: 'Generate GitHub Tamagotchi Pet'
description: 'Generate pet.svg using GitHub contribution/activity data (no server or PAT needed)'
author: 'gh-tamagotchi'

branding:
  icon: 'heart'
  color: 'red'

inputs:
  github-token:
    description: 'GitHub token (use secrets.GITHUB_TOKEN)'
    required: true
  username:
    description: 'GitHub username to generate pet for (default: repository owner)'
    required: false
    default: ${{ github.repository_owner }}
  output-path:
    description: 'Path to write the pet SVG'
    required: false
    default: 'pet.svg'
  state-path:
    description: 'Path to JSON state file (persists pet between runs)'
    required: false
    default: '.pet-state.json'
  commit-message:
    description: 'Commit message when updating pet files'
    required: false
    default: 'chore: update GitHub Tamagotchi pet'

outputs:
  output-file:
    description: 'Path to the generated SVG file'
    value: ${{ steps.generate.outputs.output-file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        REPO_ROOT="$(cd '${{ github.action_path }}'/../../.. && pwd)"
        pip install --quiet -r "$REPO_ROOT/requirements.txt"

    - name: Generate pet
      id: generate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        REPO_ROOT="$(cd '${{ github.action_path }}'/../../.. && pwd)"
        export PYTHONPATH="$REPO_ROOT"
        python "$REPO_ROOT/scripts/generate_pet.py" \
          --username '${{ inputs.username }}' \
          --state-file '${{ inputs.state-path }}' \
          --output '${{ inputs.output-path }}'
        echo "output-file=${{ inputs.output-path }}" >> "$GITHUB_OUTPUT"

    - name: Commit and push
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add '${{ inputs.output-path }}'
        git add -f '${{ inputs.state-path }}'
        git diff --staged --quiet || git commit -m '${{ inputs.commit-message }}'
        git push
