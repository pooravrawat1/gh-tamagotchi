# Generate the pet for this repo's owner and commit pet.svg.
# Keeps the README example up to date. Run manually or on a schedule.
name: Update GitHub Tamagotchi Pet

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/generate-pet
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
